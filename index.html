<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — CAAT OPS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:      #1a2e4a;
    --blue:      #1e4d8c;
    --teal:      #2a9d8f;
    --teal-lt:   #3bbfb0;
    --grey-dark: #2d3748;
    --grey-mid:  #4a5568;
    --grey-light:#e2e8f0;
    --grey-pale: #f0f4f8;
    --white:     #ffffff;
    --success:   #2a9d8f;
    --error:     #c0392b;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--grey-pale);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .container {
    width: 100%;
    max-width: 580px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .header {
    background: var(--navy);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--teal);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header-text h1 { font-size: 16px; font-weight: 600; }
  .header-text p  { font-size: 12px; opacity: 0.55; margin-top: 2px; }
  .header-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.04em;
  }
  .header-badge.connected { background: rgba(42,157,143,0.3); color: #5eead4; }
  .header-badge.error     { background: rgba(192,57,43,0.3);  color: #fca5a5; }

  /* Card */
  .card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(26,46,74,0.08);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--grey-light);
  }
  .card-header h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--grey-mid);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .card-body { padding: 20px; }
  .accent-bar { height: 3px; background: linear-gradient(90deg, var(--teal), var(--teal-lt)); }

  /* Form */
  .input-row {
    display: flex;
    gap: 10px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--navy);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: var(--teal); }
  .input-row input::placeholder { color: #a0aec0; }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    outline: none;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary  { background: var(--teal); color: white; }
  .btn-primary:hover  { background: var(--teal-lt); }
  .btn-primary:disabled { background: var(--grey-light); color: var(--grey-mid); cursor: not-allowed; transform: none; }
  .btn-danger   { background: #fdecea; color: var(--error); font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover   { background: #f9d6d3; }

  /* Notes list */
  .notes-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .note-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--grey-light);
    transition: background 0.1s;
  }
  .note-item:last-child { border-bottom: none; }
  .note-item:hover { background: var(--grey-pale); }
  .note-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }
  .note-content {
    flex: 1;
    font-size: 14px;
    color: var(--navy);
    line-height: 1.4;
  }
  .note-time {
    font-size: 11px;
    color: #a0aec0;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--grey-mid);
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty p { font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: white;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--teal); }
  .toast.error   { background: var(--error); }

  /* Count badge */
  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    background: var(--teal);
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 600;
    margin-left: 8px;
  }

  .loading-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px;
    color: var(--grey-mid);
    font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--grey-light);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div class="header-text">
      <h1>CAAT OPS — Note Tracker</h1>
      <p>Supabase Connection Test · caathai / OPS_FD</p>
    </div>
    <div class="header-badge" id="connBadge">Connecting...</div>
  </div>

  <!-- Add Note -->
  <div class="card">
    <div class="card-header">
      <h2>Add New Note</h2>
    </div>
    <div class="card-body">
      <div class="input-row">
        <input
          type="text"
          id="noteInput"
          placeholder="Type a note and press Enter or click Add..."
          maxlength="500"
        />
        <button class="btn btn-primary" id="addBtn" onclick="addNote()" disabled>Add</button>
      </div>
    </div>
  </div>

  <!-- Notes List -->
  <div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
      <h2>
        All Notes
        <span class="count-badge" id="countBadge">0</span>
      </h2>
      <button class="btn" style="padding:5px 12px;font-size:11px;background:var(--grey-pale);color:var(--grey-mid);border-radius:6px;" onclick="loadNotes()">↺ Refresh</button>
    </div>
    <div class="accent-bar"></div>
    <div id="notesList">
      <div class="loading-row">
        <div class="spinner"></div>
        <span>Connecting to Supabase...</span>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── SUPABASE CONFIG ──────────────────────────────────────
  const SUPABASE_URL  = 'https://xnauczzrkjupjfpolvzr.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuYXVjenpya2p1cGpmcG9sdnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTk3OTIsImV4cCI6MjA5NjY3NTc5Mn0.qxyTGXF7DlqhxyR6xyi2inYPEVCgQBVkRM8Ca5zpd3s';
  // ─────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ─── TOAST ────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── SET CONNECTION STATUS ────────────────────────────────
  function setConnected(ok, msg) {
    const badge = document.getElementById('connBadge');
    badge.textContent = msg;
    badge.className = 'header-badge ' + (ok ? 'connected' : 'error');
    document.getElementById('addBtn').disabled = !ok;
  }

  // ─── LOAD NOTES ───────────────────────────────────────────
  async function loadNotes() {
    const list = document.getElementById('notesList');
    list.innerHTML = `<div class="loading-row"><div class="spinner"></div><span>Loading...</span></div>`;

    const { data, error } = await db
      .from('notes')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      setConnected(false, 'Error');
      list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p style="color:#c0392b;">${error.message}</p></div>`;
      return;
    }

    setConnected(true, '● Connected');
    document.getElementById('countBadge').textContent = data.length;

    if (data.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No notes yet — add one above</p></div>`;
      return;
    }

    list.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'notes-list';

    data.forEach(note => {
      const date = new Date(note.created_at);
      const timeStr = date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' })
                    + ' ' + date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

      const item = document.createElement('div');
      item.className = 'note-item';
      item.innerHTML = `
        <div class="note-dot"></div>
        <div class="note-content">${escapeHtml(note.content)}</div>
        <div class="note-time">${timeStr}</div>
        <button class="btn btn-danger" onclick="deleteNote(${note.id})">Delete</button>
      `;
      container.appendChild(item);
    });

    list.appendChild(container);
  }

  // ─── ADD NOTE ─────────────────────────────────────────────
  async function addNote() {
    const input = document.getElementById('noteInput');
    const content = input.value.trim();
    if (!content) return;

    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const { error } = await db.from('notes').insert([{ content }]);

    btn.disabled = false;
    btn.textContent = 'Add';

    if (error) {
      showToast('Failed to add note: ' + error.message, 'error');
      return;
    }

    input.value = '';
    showToast('Note saved ✓', 'success');
    await loadNotes();
  }

  // ─── DELETE NOTE ──────────────────────────────────────────
  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;

    const { error } = await db.from('notes').delete().eq('id', id);

    if (error) {
      showToast('Failed to delete: ' + error.message, 'error');
      return;
    }

    showToast('Note deleted', 'success');
    await loadNotes();
  }

  // ─── ESCAPE HTML ──────────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── KEYBOARD SUPPORT ─────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('noteInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addNote();
    });
    loadNotes();
  });
</script>
</body>
</html>
